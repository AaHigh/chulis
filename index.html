// ── State ────────────────────────────────────────────────────────────
var G={scr:‘intro’,si:0,score:0,sus:0,heat:0,fb:null,fbt:0,end:null,t:0,lt:0,pts:[]};

// ── Layout ───────────────────────────────────────────────────────────
var R={ready:false};
var hitZones=[];

function addHit(id,x,y,w,h){
hitZones.push({id:id,x:Math.round(x),y:Math.round(y),w:Math.round(w),h:Math.round(h)});
}

function computeLayout(){
hitZones=[];
var PAD=Math.round(SW*0.036);
var GAP=Math.round(SW*0.020);

// Header — title + address
var HDR_H=Math.round(SH*0.072);
// Status row — TURN SCORE HEAT SUS
var STS_H=Math.round(SH*0.065);
var STS_Y=HDR_H;
// Sus bar
var BAR_H=Math.round(SH*0.012);
var BAR_Y=STS_Y+STS_H;
// Scene panel
var SCN_Y=BAR_Y+BAR_H+GAP;
var SCN_H=Math.round(SH*0.310);
// Choice button area — everything below scene panel
var BTM=Math.round(SH*0.016);
var CH_Y=SCN_Y+SCN_H+GAP;
var CH_H=SH-CH_Y-BTM;
var ROW_H=Math.floor((CH_H-GAP)/2);
var COL_W=Math.floor((SW-2*PAD-GAP)/2);

// Intro/over button — bottom-anchored
var sbH=Math.round(SH*0.078);
var sbX=Math.round(SW*0.08);
var sbY=Math.round(SH-sbH-Math.round(SH*0.032));

R={
ready:true,
PAD:PAD,GAP:GAP,
hdr:{x:0,y:0,w:SW,h:HDR_H},
sts:{x:0,y:STS_Y,w:SW,h:STS_H},
bar:{x:0,y:BAR_Y,w:SW,h:BAR_H},
scn:{x:PAD,y:SCN_Y,w:SW-2*PAD,h:SCN_H},
ch:[
{x:PAD,           y:CH_Y,           w:COL_W,h:ROW_H},
{x:PAD+COL_W+GAP, y:CH_Y,           w:COL_W,h:ROW_H},
{x:PAD,           y:CH_Y+ROW_H+GAP, w:COL_W,h:ROW_H},
{x:PAD+COL_W+GAP, y:CH_Y+ROW_H+GAP,w:COL_W,h:ROW_H},
],
sbH:sbH, sbX:sbX, sbY:sbY,
sbW:Math.round(SW*0.84),
};

// Hit zones are rebuilt per-screen in rebuildHitZones()
rebuildHitZones();
}

function rebuildHitZones(){
hitZones=[];
if(G.scr===‘intro’||G.scr===‘over’){
// Only the single bottom button — no game buttons
addHit(G.scr===‘intro’?‘start’:‘restart’, R.sbX, R.sbY, R.sbW, R.sbH);
} else if(G.scr===‘game’||G.scr===‘fb’){
// Four choice buttons only
for(var i=0;i<4;i++) addHit(‘ch’+i,R.ch[i].x,R.ch[i].y,R.ch[i].w,R.ch[i].h);
}
}

// ── Input ────────────────────────────────────────────────────────────
function hitTest(tx,ty){
for(var i=hitZones.length-1;i>=0;i–){
var z=hitZones[i];
if(tx>=z.x&&tx<=z.x+z.w&&ty>=z.y&&ty<=z.y+z.h) return z.id;
}
return null;
}
function handleTap(tx,ty){
var id=hitTest(tx,ty);
if(G.scr===‘intro’){
if(id===‘start’){ G.scr=‘game’; rebuildHitZones(); }
return;
}
if(G.scr===‘over’){
if(id===‘restart’){ resetGame(); return; }
return;
}
if(G.scr===‘game’){
for(var i=0;i<4;i++) if(id===‘ch’+i){ doChoice(i); return; }
}
// fb screen: taps do nothing, auto-advances
}

function getCanvasXY(clientX, clientY){
// Use getBoundingClientRect so we work correctly inside iframes too
var r=cv.getBoundingClientRect();
// Scale from CSS pixels to canvas pixels (cv.width may differ from CSS width if DPR scaling)
var scaleX = cv.width  / (r.width  || SW);
var scaleY = cv.height / (r.height || SH);
return {
x: (clientX - r.left) * scaleX,
y: (clientY - r.top)  * scaleY
};
}

// Debug: show last tap position on canvas for 1 second
var _dbgTap = null;

cv.addEventListener(‘touchstart’,function(e){
e.preventDefault();
for(var i=0;i<e.changedTouches.length;i++){
var p=getCanvasXY(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
var hitId=hitTest(p.x,p.y);
_dbgTap={x:p.x,y:p.y,t:G.t,id:hitId};
dbgLog(‘TAP (’+Math.round(p.x)+’,’+Math.round(p.y)+’) scr=’+G.scr+’ hit=’+hitId+’ zones=’+hitZones.length);
handleTap(p.x, p.y);
}
},{passive:false});
cv.addEventListener(‘touchmove’, function(e){e.preventDefault();},{passive:false});
cv.addEventListener(‘touchend’,  function(e){e.preventDefault();},{passive:false});
cv.addEventListener(‘touchcancel’,function(e){e.preventDefault();},{passive:false});
cv.addEventListener(‘mousedown’, function(e){
var p=getCanvasXY(e.clientX,e.clientY);
_dbgTap={x:p.x,y:p.y,t:G.t};
handleTap(p.x,p.y);
});

// ── Particles ────────────────────────────────────────────────────────
function spawnPts(x,y,col,n){
for(var i=0;i<(n||10);i++)
G.pts.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:-Math.random()*7-2,life:1,col:col,r:Math.random()*4+2});
}
function tickPts(dt){
var a=[];
for(var i=0;i<G.pts.length;i++){
var p=G.pts[i];
p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.20*dt*60;p.life-=dt*1.6;
if(p.life>0)a.push(p);
}
G.pts=a;
}
function drawPts(){
for(var i=0;i<G.pts.length;i++){
var p=G.pts[i];
CTX.globalAlpha=p.life;CTX.fillStyle=p.col;
CTX.beginPath();CTX.arc(p.x,p.y,p.r,0,Math.PI*2);CTX.fill();
}
CTX.globalAlpha=1;
}

// ── Draw helpers ──────────────────────────────────────────────────────
function rr(x,y,w,h,r){
CTX.beginPath();
CTX.moveTo(x+r,y);
CTX.arcTo(x+w,y,x+w,y+h,r);CTX.arcTo(x+w,y+h,x,y+h,r);
CTX.arcTo(x,y+h,x,y,r);CTX.arcTo(x,y,x+w,y,r);
CTX.closePath();
}
function fillRR(x,y,w,h,r,c){CTX.fillStyle=c;rr(x,y,w,h,r);CTX.fill();}
function strokeRR(x,y,w,h,r,c,lw){CTX.strokeStyle=c;CTX.lineWidth=lw||1;rr(x,y,w,h,r);CTX.stroke();}
function glow(c,b){CTX.shadowColor=c;CTX.shadowBlur=b;}
function ng(){CTX.shadowBlur=0;}

// Font stacks — no external fonts needed, all system fonts
var FD=’“Arial Black”,“Impact”,“Arial Bold”,sans-serif’;  // display/bold
var FM=’“Courier New”,“Courier”,monospace’;               // mono/body

function wrapTxt(str,maxW,sz){
CTX.font=Math.round(sz)+‘px ‘+FM;
var words=str.split(’ ‘),lines=[],line=’’;
for(var i=0;i<words.length;i++){
var w=words[i],test=line?line+’ ’+w:w;
if(CTX.measureText(test).width>maxW&&line){lines.push(line);line=w;}
else line=test;
}
if(line)lines.push(line);
return lines;
}

// Grain overlay — pre-baked offscreen canvas, redrawn every ~6 frames
var _grain=null,_grainT=0;
function drawGrain(){
var now=G.t;
if(!_grain||(now-_grainT)>0.1){
_grainT=now;
var gw=128,gh=128;
var tmp=document.createElement(‘canvas’);
tmp.width=gw;tmp.height=gh;
var tc=tmp.getContext(‘2d’);
if(tc){
var id=tc.createImageData(gw,gh);
var d=id.data;
for(var i=0;i<d.length;i+=4){var v=Math.random()*20|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=13;}
tc.putImageData(id,0,0);
_grain=tmp;
}
}
if(_grain){
try{
var pat=CTX.createPattern(_grain,‘repeat’);
if(pat){CTX.globalAlpha=0.28;CTX.fillStyle=pat;CTX.fillRect(0,0,SW,SH);CTX.globalAlpha=1;}
}catch(e){}
}
}

CTX.fillStyle=g;CTX.fillRect(0,0,SW,SH);

var ctr=SW/2, y=SH*0.04;

// Title
var tsz=s(54);
glow(GOLD,20);
CTX.font=’bold ’+Math.round(tsz)+’px ’+FD;
CTX.fillStyle=GOLD;CTX.textAlign=‘center’;CTX.textBaseline=‘alphabetic’;
CTX.fillText(‘EL RINCON’,ctr,y+tsz);
CTX.fillText(‘LA CHULIS’,ctr,y+tsz*2+s(6));
ng();
CTX.globalAlpha=.25;CTX.fillStyle=RED;
CTX.fillText(‘LA CHULIS’,ctr+s(4),y+tsz*2+s(10));
CTX.globalAlpha=1;
y+=tsz*2.4+s(12);

// Subtitle
CTX.font=Math.round(s(12))+’px ’+FM;
CTX.fillStyle=STEAM;CTX.textAlign=‘center’;CTX.textBaseline=‘alphabetic’;
CTX.fillText(‘COFFEE · CARTEL LEGACY · QUESTIONABLE CHOICES’,ctr,y,SW-s(20));
y+=s(20);

// Divider
CTX.strokeStyle=GOLDD;CTX.lineWidth=1;
CTX.beginPath();CTX.moveTo(s(24),y);CTX.lineTo(SW-s(24),y);CTX.stroke();
y+=s(16);

// Lore — bigger font

// ── Game logic ────────────────────────────────────────────────────────
function doChoice(i){
if(G.scr!==‘game’) return;
var ch=SCENES[G.si].ch[i];
G.score=Math.max(0,G.score+ch.pts);
G.sus  =Math.max(0,Math.min(100,G.sus+ch.sus));
G.heat =Math.max(0,Math.min(100,G.heat+ch.ht));
spawnPts(SW/2,SH*0.6,RISK_C[ch.risk],16);
G.fb={ic:ch.ic,hd:ch.hd,he:ch.he,ch:{pts:ch.pts,sus:ch.sus,ht:ch.ht}};
G.fbt=0; G.scr=‘fb’;
rebuildHitZones(); // fb screen has no hit zones — clears game buttons
}
function checkEnd(){
if(G.sus>=100){
G.end={ic:‘📞’,ti:‘LAISHA MADE A CALL’,win:false,
tx:‘Someone arrived in a black Suburban in 8 minutes. You left your horchata unfinished. Best horchata of your life.’};
G.scr=‘over’; rebuildHitZones(); return;
}
if(G.heat>=100){
G.end={ic:‘🚔’,ti:‘DEA WANTS A WORD’,win:false,
tx:‘New Balance 990s outside your apartment. “Just questions.” Never just questions. The torta de mole haunts your dreams.’};
G.scr=‘over’; rebuildHitZones(); return;
}
if(G.si>=SCENES.length){
var gr=G.score>=160?‘LEGENDARY CUSTOMER’:G.score>=120?‘SOLID REGULAR’:G.score>=80?‘PASSABLE HUMAN’:‘SUSPICIOUS INDIVIDUAL’;
G.end={ic:‘☕’,ti:‘EL RINCON TE DA LAS GRACIAS’,win:true,gr:gr,
tx:G.score>=130?‘You navigated the most complicated Tuesday of your life with grace. The horchata was a 10/10. Laisha runs a good shop.’:‘You made some choices today. Some were coffee choices. The horchata was excellent and nothing changes that.’};
G.scr=‘over’; rebuildHitZones();
} else {
G.scr=‘game’; rebuildHitZones(); // back to game, restore choice buttons
}
}
function resetGame(){
G={scr:‘intro’,si:0,score:0,sus:0,heat:0,fb:null,fbt:0,end:null,t:0,lt:performance.now(),pts:[]};
rebuildHitZones();
}

// ════════════════════════════════════════════════════════════════════
//  MAIN LOOP
//  *** rAF is called FIRST, then guard checks layout ***
//  This means the loop NEVER dies even if layout isn’t ready.
//  This was the GitHub Pages black screen bug.
// ════════════════════════════════════════════════════════════════════
function draw(ts){
// ALWAYS reschedule first — loop must never die
requestAnimationFrame(draw);

_frameCount++;

if(!CTX){
if(_frameCount===1) dbgLog(‘draw: NO CTX - canvas broken’);
return;
}

// Guard — skip drawing if layout not computed yet
if(!SW||!SH||!R.ready){
if(_frameCount===1)  dbgLog(‘6. frame 1: waiting for layout SW=’+SW+’ SH=’+SH+’ ready=’+R.ready);
if(_frameCount===30) dbgLog(’   frame 30: still waiting…’);
if(_frameCount===120)dbgLog(’   frame 120: STUCK - layout never completed’);
return;
}

var dt=Math.min((ts-G.lt)/1000,.05);
G.lt=ts; G.t+=dt;

if(G.scr===‘fb’){
G.fbt+=dt;
if(G.fbt>=2.5){G.si++;checkEnd();}
}

tickPts(dt);

try{
CTX.fillStyle=’#000’; CTX.fillRect(0,0,SW,SH);
}catch(e){
dbgLog(’fillRect ERR: ’+e.message); return;
}

try{
if     (G.scr===‘intro’) drawIntro(G.t);
else if(G.scr===‘game’)  drawGame(G.t);
else if(G.scr===‘fb’)    drawFeedback(G.t);
else if(G.scr===‘over’)  drawOver(G.t);
}catch(e){
dbgLog(‘DRAW ERR [’+G.scr+’]: ‘+e.message);
dbgLog(e.stack?e.stack.split(’\n’)[1]:’’);
return;
}

drawPts();

try{ drawGrain(); }catch(e){ /* grain failing is non-fatal */ }

// Debug tap indicator — crosshair shows where you tapped and what it hit
if(_dbgTap && (G.t-_dbgTap.t) < 2.0){
var age=G.t-_dbgTap.t, alpha=Math.max(0,1-age/2.0);
CTX.save(); CTX.globalAlpha=alpha;
CTX.strokeStyle=’#ff0’; CTX.lineWidth=2;
CTX.beginPath(); CTX.moveTo(_dbgTap.x-22,_dbgTap.y); CTX.lineTo(_dbgTap.x+22,_dbgTap.y); CTX.stroke();
CTX.beginPath(); CTX.moveTo(_dbgTap.x,_dbgTap.y-22); CTX.lineTo(_dbgTap.x,_dbgTap.y+22); CTX.stroke();
CTX.font=‘bold 15px monospace’; CTX.textAlign=‘left’; CTX.textBaseline=‘alphabetic’;
CTX.fillStyle=’#ff0’;
CTX.fillText(‘TAP ‘+Math.round(_dbgTap.x)+’,’+Math.round(_dbgTap.y), Math.min(_dbgTap.x+8,SW-160), _dbgTap.y-8);
CTX.fillStyle=’#0ff’;
CTX.fillText(’HIT: ’+(_dbgTap.id||‘none’), Math.min(_dbgTap.x+8,SW-160), _dbgTap.y+18);
CTX.restore();
}

// Hide HTML debug overlay after 5 good frames
if(_frameCount===5) dbgHide();
}

// ── BOOT ────────────────────────────────────────────────────────────
dbgLog(‘6. calling resize()…’);
resize();
dbgLog(‘7. resize done. calling rAF…’);
G.lt=performance.now();
requestAnimationFrame(draw);
dbgLog(‘8. rAF scheduled. Boot complete.’);
</script>
