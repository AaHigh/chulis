SH = document.documentElement.clientHeight || window.innerHeight || 844;

cv.height = SH;

hitZones.push({id:id,x:Math.round(x),y:Math.round(y),w:Math.round(w),h:Math.round(h)});

function computeLayout(){
hitZones = [];
var PAD = Math.round(SW*0.038);
var GAP = Math.round(SW*0.022);

var HDR_H = Math.round(SH*0.068);
var STS_H = Math.round(SH*0.058);
var BAR_H = Math.round(SH*0.011);
var STS_Y = HDR_H;
var BAR_Y = STS_Y + STS_H;

var SCN_Y = BAR_Y + BAR_H + Math.round(SH*0.010);
var SCN_H = Math.round(SH*0.310);  // taller scene panel

var BTM   = Math.round(SH*0.018);
var CH_Y  = SCN_Y + SCN_H + GAP;
var CH_H  = SH - CH_Y - BTM;
var ROW_H = Math.floor((CH_H - GAP) / 2);
var COL_W = Math.floor((SW - 2*PAD - GAP) / 2);

R = {
ready: true,
PAD:PAD, GAP:GAP,
hdr: {x:0,   y:0,     w:SW,       h:HDR_H},
sts: {x:0,   y:STS_Y, w:SW,       h:STS_H},
bar: {x:0,   y:BAR_Y, w:SW,       h:BAR_H},
scn: {x:PAD, y:SCN_Y, w:SW-2*PAD, h:SCN_H},
ch: [
{x:PAD,         y:CH_Y,          w:COL_W, h:ROW_H},
{x:PAD+COL_W+GAP, y:CH_Y,        w:COL_W, h:ROW_H},
{x:PAD,         y:CH_Y+ROW_H+GAP,w:COL_W, h:ROW_H},
{x:PAD+COL_W+GAP,y:CH_Y+ROW_H+GAP,w:COL_W,h:ROW_H},
],
};

// Hit zones — registered once in computeLayout, exact CELLTOWER pattern
for(var i=0;i<4;i++) addHit(‘ch’+i,R.ch[i].x,R.ch[i].y,R.ch[i].w,R.ch[i].h);

// Intro start button — anchored to bottom, Y updated each frame in drawIntro
var sbW=Math.round(SW*0.84), sbH=Math.round(SH*0.076);
var sbX=Math.round((SW-sbW)/2);
var sbY=Math.round(SH-sbH-Math.round(SH*0.04)); // bottom-anchored
R.startBtn={x:sbX,y:sbY,w:sbW,h:sbH};
addHit(‘start’,sbX,sbY,sbW,sbH);

// Over restart button
var rbW=Math.round(SW*0.84), rbH=Math.round(SH*0.076);
var rbX=Math.round((SW-rbW)/2);
R.restartBtn={x:rbX,w:rbW,h:rbH}; // y set dynamically in drawOver
// placeholder hit — y updated each frame in drawOver
addHit(‘restart’,rbX,Math.round(SH*0.76),rbW,rbH);
}

// ── State ───────────────────────────────────────────────────────────
var G={scr:‘intro’,si:0,score:0,sus:0,heat:0,fb:null,fbt:0,end:null,t:0,lt:0,pts:[]};

// ── Input — exact CELLTOWER pattern ────────────────────────────────
// canvas is position:fixed top:0 left:0, so clientX IS canvas coords — no offset needed
function hitTest(tx,ty){
// scan in reverse — last-registered wins (same as CELLTOWER)
for(var i=hitZones.length-1;i>=0;i–){
var z=hitZones[i];
if(tx>=z.x&&tx<=z.x+z.w&&ty>=z.y&&ty<=z.y+z.h) return z.id;
}
return null;
}

function handleTap(tx,ty){
var id=hitTest(tx,ty);
if(G.scr===‘intro’){
if(id===‘start’) G.scr=‘game’;
return;
}
if(G.scr===‘over’){
if(id===‘restart’) resetGame();
return;
}
if(G.scr===‘game’){
for(var i=0;i<4;i++) if(id===‘ch’+i){ doChoice(i); return; }
}
// fb screen: taps do nothing (auto-advances)
}

cv.addEventListener(‘touchstart’,function(e){
e.preventDefault();
for(var i=0;i<e.changedTouches.length;i++){
handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
}
},{passive:false});

cv.addEventListener(‘touchmove’,function(e){ e.preventDefault(); },{passive:false});
cv.addEventListener(‘touchend’, function(e){ e.preventDefault(); },{passive:false});
cv.addEventListener(‘touchcancel’,function(e){ e.preventDefault(); },{passive:false});

// Mouse fallback (desktop testing)
cv.addEventListener(‘mousedown’,function(e){ handleTap(e.clientX,e.clientY); });

// ── Particles ───────────────────────────────────────────────────────
function spawnPts(x,y,col,n){
for(var i=0;i<(n||10);i++)
G.pts.push({x:x,y:y,vx:(Math.random()-.5)*5,vy:-Math.random()*6-1,life:1,col:col,r:Math.random()*3+2});
}
function tickPts(dt){
var a=[];
for(var i=0;i<G.pts.length;i++){
var p=G.pts[i];
p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.18*dt*60;p.life-=dt*1.8;
if(p.life>0) a.push(p);
}
G.pts=a;
}
function drawPts(){
for(var i=0;i<G.pts.length;i++){
var p=G.pts[i];
CTX.globalAlpha=p.life;CTX.fillStyle=p.col;
CTX.beginPath();CTX.arc(p.x,p.y,p.r,0,Math.PI*2);CTX.fill();
}
CTX.globalAlpha=1;
}

// ── Draw helpers ────────────────────────────────────────────────────
function rr(x,y,w,h,r){
CTX.beginPath();
CTX.moveTo(x+r,y);
CTX.arcTo(x+w,y,x+w,y+h,r);CTX.arcTo(x+w,y+h,x,y+h,r);
CTX.arcTo(x,y+h,x,y,r);CTX.arcTo(x,y,x+w,y,r);
CTX.closePath();
}
function fillRR(x,y,w,h,r,c){CTX.fillStyle=c;rr(x,y,w,h,r);CTX.fill();}
function strokeRR(x,y,w,h,r,c,lw){CTX.strokeStyle=c;CTX.lineWidth=lw||1;rr(x,y,w,h,r);CTX.stroke();}

var FD=’“Arial Black”,“Impact”,sans-serif’;
var FM=’“Courier New”,monospace’;

function tf(str,x,y,sz,col,align,mw,bold,mono){
CTX.font=(bold?‘bold ‘:’’)+Math.round(sz)+’px ’+(mono?FM:FD);
CTX.fillStyle=col;CTX.textAlign=align||‘left’;CTX.textBaseline=‘alphabetic’;
if(mw) CTX.fillText(str,x,y,mw); else CTX.fillText(str,x,y);
}
function glow(c,b){CTX.shadowColor=c;CTX.shadowBlur=b;}
function ng(){CTX.shadowBlur=0;}

function wrapTxt(str,mw,sz,mono){
CTX.font=Math.round(sz)+‘px ‘+(mono?FM:FD);
var words=str.split(’ ‘),lines=[],line=’’;
for(var i=0;i<words.length;i++){
var w=words[i],test=line?line+’ ’+w:w;
if(CTX.measureText(test).width>mw&&line){lines.push(line);line=w;}
else line=test;
}
if(line) lines.push(line);
return lines;
}

// Grain — same pattern as CELLTOWER (generated per-frame-group)
var _grainCache=null,_grainFrame=-1;
function drawGrain(){
var fr=Math.floor(G.t*30)|0;
if(fr!==_grainFrame){
_grainFrame=fr;
var tmp=document.createElement(‘canvas’);
tmp.width=128;tmp.height=128;
var tc=tmp.getContext(‘2d’);
var id=tc.createImageData(128,128);
var d=id.data;
for(var i=0;i<d.length;i+=4){var v=Math.random()*18|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=11;}
tc.putImageData(id,0,0);
_grainCache=tmp;
}
if(_grainCache){
CTX.globalAlpha=0.28;
CTX.fillStyle=CTX.createPattern(_grainCache,‘repeat’);
CTX.fillRect(0,0,SW,SH);
CTX.globalAlpha=1;
}
}

// ── Game logic ──────────────────────────────────────────────────────
function doChoice(i){
if(G.scr!==‘game’) return;
var ch=SCENES[G.si].ch[i];
G.score=Math.max(0,G.score+ch.pts);
G.sus=Math.max(0,Math.min(100,G.sus+ch.sus));
G.heat=Math.max(0,Math.min(100,G.heat+ch.ht));
spawnPts(SW/2,SH*.6,RISK_C[ch.risk],14);
G.fb={ic:ch.ic,hd:ch.hd,he:ch.he,ch:{pts:ch.pts,sus:ch.sus,ht:ch.ht}};
G.fbt=0;G.scr=‘fb’;
}
function checkEnd(){
if(G.sus>=100){G.end={ic:‘📞’,ti:‘LAISHA MADE A CALL’,win:false,tx:‘Someone arrived in a black Suburban in 8 minutes. You left your horchata. Best horchata of your life.’};G.scr=‘over’;return;}
if(G.heat>=100){G.end={ic:‘🚔’,ti:‘DEA WANTS A WORD’,win:false,tx:‘New Balance 990s outside your apartment. “Just questions.” Never just questions. The torta de mole haunts your dreams.’};G.scr=‘over’;return;}
if(G.si>=SCENES.length){
var gr=G.score>=160?‘LEGENDARY CUSTOMER’:G.score>=120?‘SOLID REGULAR’:G.score>=80?‘PASSABLE HUMAN’:‘SUSPICIOUS INDIVIDUAL’;
G.end={ic:‘☕’,ti:‘EL RINCON TE DA LAS GRACIAS’,win:true,gr:gr,
tx:G.score>=130?‘You navigated the most complicated Tuesday of your life with grace. The horchata was a 10/10. Laisha runs a good shop.’:‘You made some choices today. Some were coffee choices. Some were others. The horchata was excellent and nothing changes that.’};
G.scr=‘over’;
}
}
function resetGame(){
G={scr:‘intro’,si:0,score:0,sus:0,heat:0,fb:null,fbt:0,end:null,t:0,lt:performance.now(),pts:[]};
}

// ── MAIN DRAW — guards on !SW||!SH||!R.ready, exact CELLTOWER pattern
function draw(ts){
if(!SW||!SH||!R.ready) return;  // layout not ready yet
var dt=Math.min((ts-G.lt)/1000,.05);
G.lt=ts;G.t+=dt;

if(G.scr===‘fb’){
G.fbt+=dt;
if(G.fbt>=2.2){G.si++;G.scr=‘game’;checkEnd();}
}

tickPts(dt);

CTX.fillStyle=’#000’;CTX.fillRect(0,0,SW,SH);

if     (G.scr===‘intro’) drawIntro(G.t);
else if(G.scr===‘game’)  drawGame(G.t);
else if(G.scr===‘fb’)    drawFeedback(G.t);
else if(G.scr===‘over’)  drawOver(G.t);

drawPts();
drawGrain();

requestAnimationFrame(draw);
}

// ── BOOT — resize() first, then rAF immediately — exact CELLTOWER
resize();
G.lt = performance.now();
requestAnimationFrame(draw);
</script>
