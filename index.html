// ── Viewport ────────────────────────────────────────────────────
let W, H, DPR, SC; // SC = scale factor from 390pt base

function resize() {
DPR = Math.min(window.devicePixelRatio || 1, 3);
W = window.innerWidth;
H = window.innerHeight;
cv.width  = Math.round(W * DPR);
cv.height = Math.round(H * DPR);
cv.style.width  = W + ‘px’;
cv.style.height = H + ‘px’;
ctx_reset_scale();
SC = Math.min(W / 390, H / 844);
}

function ctx_reset_scale() {
cx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

resize();
window.addEventListener(‘resize’, () => { resize(); });

// ── State ────────────────────────────────────────────────────────
let G = {
screen: ‘intro’,  // intro | game | fb | over
si: 0,            // scene index
score: 0,
sus: 0,
heat: 0,
fb: null,         // feedback data
fbt: 0,           // feedback timer (seconds)
end: null,
t: 0,
lt: 0,
pts: [],          // particles
};

// ── Button registry (rebuilt each frame) ─────────────────────────
let BTNS = [];
function reg(id, x, y, w, h, fn) { BTNS.push({id,x,y,w,h,fn}); }

// ── Input ────────────────────────────────────────────────────────
function getPos(e) {
const r = cv.getBoundingClientRect();
const src = e.changedTouches ? e.changedTouches[0] : e;
return { x: src.clientX - r.left, y: src.clientY - r.top };
}
cv.addEventListener(‘pointerdown’, e => {
e.preventDefault();
const p = getPos(e);
for (const b of BTNS) {
if (p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h) { b.fn(); break; }
}
}, { passive: false });

// ── Particles ────────────────────────────────────────────────────
function spawnPts(x, y, col, n=10) {
for (let i=0;i<n;i++) {
G.pts.push({
x, y,
vx:(Math.random()-0.5)*5,
vy:-Math.random()*6-1,
life:1, col,
r:Math.random()*3+2
});
}
}
function tickPts(dt) {
G.pts = G.pts.filter(p=>{
p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.vy+=0.18*dt*60; p.life-=dt*1.8;
return p.life>0;
});
}
function drawPts() {
for (const p of G.pts) {
cx.globalAlpha = p.life;
cx.fillStyle = p.col;
cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill();
}
cx.globalAlpha = 1;
}

// ── Draw Utilities ────────────────────────────────────────────────
function rr(x,y,w,h,r) {
cx.beginPath();
cx.moveTo(x+r,y);
cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
cx.arcTo(x,y+h,x,y,r);     cx.arcTo(x,y,x+w,y,r);
cx.closePath();
}
function fillRR(x,y,w,h,r,col)      { cx.fillStyle=col; rr(x,y,w,h,r); cx.fill(); }
function strokeRR(x,y,w,h,r,col,lw) { cx.strokeStyle=col; cx.lineWidth=lw||1; rr(x,y,w,h,r); cx.stroke(); }

function tf(str,x,y,font,col,align,mw) {
cx.font=font; cx.fillStyle=col; cx.textAlign=align||‘left’;
if(mw) cx.fillText(str,x,y,mw); else cx.fillText(str,x,y);
}
function glow(col,b) { cx.shadowColor=col; cx.shadowBlur=b; }
function ng()        { cx.shadowBlur=0; }

// Wrap text into lines array
function wrapText(str, maxW, font) {
cx.font = font;
const words = str.split(’ ‘);
const lines = []; let line=’’;
for (const w of words) {
const t = line ? line+’ ’+w : w;
if (cx.measureText(t).width > maxW && line) { lines.push(line); line=w; }
else line=t;
}
if (line) lines.push(line);
return lines;
}

// ── Grain (static, regenerated each frame) ───────────────────────
function drawGrain() {
const iw=64, ih=64;
const tmp = document.createElement(‘canvas’);
tmp.width=iw; tmp.height=ih;
const tc = tmp.getContext(‘2d’);
const id = tc.createImageData(iw,ih);
const d=id.data;
for (let i=0;i<d.length;i+=4){
const v=Math.random()*25|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=14;
}
tc.putImageData(id,0,0);
cx.globalAlpha=0.4;
const pat=cx.createPattern(tmp,‘repeat’);
cx.fillStyle=pat; cx.fillRect(0,0,W,H);
cx.globalAlpha=1;
}

// ── INTRO ────────────────────────────────────────────────────────
function drawIntro(t) {
BTNS=[];

// BG
cx.fillStyle=DARK; cx.fillRect(0,0,W,H);
const g=cx.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,W*0.8);
g.addColorStop(0,‘rgba(80,30,5,0.4)’); g.addColorStop(1,‘rgba(0,0,0,0)’);
cx.fillStyle=g; cx.fillRect(0,0,W,H);

// Steam wisps
for (let i=0;i<4;i++) {
const sx = W*(0.25+i*0.17);
const phase = ((t*0.6+i*1.5)%1)*H*0.5;
cx.strokeStyle=`rgba(255,255,255,${0.03+Math.sin(t+i)*0.01})`;
cx.lineWidth=s(2);
cx.beginPath();
cx.moveTo(sx+Math.sin(t*0.7+i)*s(15), H-phase);
cx.bezierCurveTo(
sx+Math.sin(t+i)*s(20), H-phase-s(40),
sx+Math.cos(t+i)*s(20), H-phase-s(80),
sx+Math.sin(t+i+2)*s(10), H-phase-s(120)
);
cx.stroke();
}

const ctr = W/2;
let y = H*0.05;

// Title
const tsz = s(54);
glow(GOLD,20);
tf(‘EL RINCÓN’, ctr, y+tsz, `bold ${tsz}px Bebas,Impact,sans-serif`, GOLD, ‘center’);
tf(‘LA CHULIS’, ctr, y+tsz*2+s(4), `bold ${tsz}px Bebas,Impact,sans-serif`, GOLD, ‘center’);
ng();
cx.globalAlpha=0.35;
tf(‘LA CHULIS’, ctr+s(3), y+tsz*2+s(8), `bold ${tsz}px Bebas,Impact,sans-serif`, RED, ‘center’);
cx.globalAlpha=1;

y += tsz*2.3+s(12);

tf(‘A GAME OF COFFEE, CARTEL LEGACY & QUESTIONABLE CHOICES’,
ctr, y, `${s(9)}px Bebas,Impact,sans-serif`, STEAM, ‘center’, W-s(30));
y += s(18);

// Divider
cx.strokeStyle=GOLDD; cx.lineWidth=1;
cx.beginPath(); cx.moveTo(s(30),y); cx.lineTo(W-s(30),y); cx.stroke();
y += s(14);

// Lore
const lf = `${s(11)}px monospace`;
const lb = `bold ${s(11)}px monospace`;
const lore = [
[‘PERRIS, CA.  802 Navajo Rd.  A strip mall.’, true],
[’’, false],
[‘LAISHA OSEGUERA GONZÁLEZ, 24,’, true],
[‘business student. Daughter of El Mencho —’, false],
[‘CJNG boss, killed Feb 22 in mil. operation.’, false],
[‘Husband El Gaucho: 11 yrs federal.’, false],
[‘Sister La Negra: 25 months money laundering.’, false],
[‘Brother: life sentence.’, false],
[’’, false],
[‘You are a customer.  A suspicious one.’, false],
];

const lh = s(16);
for (const [line,bold] of lore) {
if (line) tf(line, s(26), y, bold?lb:lf, bold?GOLD:CREAM, ‘left’, W-s(32));
y += lh;
}
y += s(8);

// Rules box
const rboxH = s(104);
fillRR(s(16),y,W-s(32),rboxH,s(7),‘rgba(255,255,255,0.03)’);
strokeRR(s(16),y,W-s(32),rboxH,s(7),‘rgba(212,160,23,0.2)’);
tf(‘HOW TO PLAY’, s(28), y+s(16), `${s(10)}px Bebas,Impact,sans-serif`, GOLD, ‘left’);
const rules=[
‘4 choices each turn — like a spinner.’,
‘🟢 Low  🟡 Medium  🔴 High  🟣 Wild’,
‘Suspicion 100% → Laisha makes a call.’,
‘Heat 100% → DEA wants a word.’,
‘Goal: max Café Score before getting bounced.’,
];
const rf2=`${s(10)}px monospace`;
rules.forEach((r,i)=>tf(r,s(28),y+s(30)+i*s(15),rf2,i===0?CREAM:STEAM,‘left’,W-s(56)));
y += rboxH+s(12);

// Start button
const bw=W-s(56), bh=s(54), bx=s(28), by=Math.min(y, H-s(120));
const pulse=0.82+Math.sin(t*2.8)*0.18;
cx.globalAlpha=pulse;
fillRR(bx,by,bw,bh,s(10),GOLD);
cx.globalAlpha=1;
tf(‘☕  ORDER SOMETHING’, bx+bw/2, by+bh/2+s(8),
`bold ${s(15)}px Bebas,Impact,sans-serif`, ‘#1a0f00’, ‘center’);
reg(‘start’,bx,by,bw,bh,()=>{ G.screen=‘game’; });

y = by+bh+s(12);
tf(’[ Hightower live ] — Made with Claude AI / Anthropic · Satire’,
ctr, y, `${s(8)}px monospace`, ‘rgba(255,255,255,0.2)’, ‘center’, W-s(20));
}

function drawGame(t) {
BTNS=[];
const sc = SCENES[G.si];

// BG
cx.fillStyle=BG; cx.fillRect(0,0,W,H);

// Header
const hh = s(54);
cx.fillStyle=DARK; cx.fillRect(0,0,W,hh+s(14));
cx.strokeStyle=GOLD; cx.lineWidth=1.5;
cx.beginPath(); cx.moveTo(0,hh); cx.lineTo(W,hh); cx.stroke();

tf(‘EL RINCÓN LA CHULIS’, W/2, s(22),
`${s(14)}px Bebas,Impact,sans-serif`, GOLD, ‘center’);
tf(‘802 Navajo Rd · Perris, CA’, W/2, s(38),
`${s(9)}px monospace`, STEAM, ‘center’);

// Neon sign flicker
const flk = Math.random()>0.02?1:0.3;
cx.globalAlpha=flk;
glow(GREEN,8);
tf(’“La vida es corta, cómete una torta”’, W/2, s(52),
`italic ${s(8.5)}px monospace`, ‘rgba(57,255,20,0.65)’, ‘center’, W-s(20));
ng(); cx.globalAlpha=1;

// Status row
const sy = hh+s(6);
const sw2=W/4;
const stats=[
{l:‘TURN’, v:`${G.si+1}/8`},
{l:‘SCORE’, v:G.score},
{l:‘HEAT 🌶’, v:G.heat},
{l:‘SUS’, v:G.sus+’%’},
];
stats.forEach((st,i)=>{
const x=i*sw2;
if(i>0){
cx.strokeStyle=‘rgba(212,160,23,0.15)’; cx.lineWidth=1;
cx.beginPath(); cx.moveTo(x,sy); cx.lineTo(x,sy+s(34)); cx.stroke();
}
tf(st.l, x+sw2/2, sy+s(13), `${s(8)}px Bebas,Impact,sans-serif`, STEAM, ‘center’);
const vc = (st.l===‘SUS’&&G.sus>65)||(st.l===‘HEAT 🌶’&&G.heat>65) ? RED : GOLD;
tf(String(st.v), x+sw2/2, sy+s(27), `bold ${s(14)}px Bebas,Impact,sans-serif`, vc, ‘center’);
});

// Sus gradient bar
const sby = sy+s(35);
cx.fillStyle=‘rgba(255,255,255,0.07)’;
cx.fillRect(0,sby,W,s(3));
const sg=cx.createLinearGradient(0,0,W,0);
sg.addColorStop(0,’#1a7a06’); sg.addColorStop(0.5,GOLD); sg.addColorStop(1,RED);
cx.fillStyle=sg;
cx.fillRect(0,sby,(G.sus/100)*W,s(3));

let y=sby+s(10);

// Location badge
cx.strokeStyle=‘rgba(192,57,43,0.4)’; cx.lineWidth=1;
cx.beginPath(); cx.moveTo(s(14),y+s(7)); cx.lineTo(s(50),y+s(7)); cx.stroke();
tf(sc.loc, s(56), y+s(10), `${s(10)}px Bebas,Impact,sans-serif`, RED, ‘left’);
const lw2 = cx.measureText(sc.loc).width + s(8);
cx.beginPath(); cx.moveTo(s(56)+lw2,y+s(7)); cx.lineTo(W-s(14),y+s(7)); cx.stroke();
y += s(20);

// Scene panel
const ph = s(112);
fillRR(s(10),y,W-s(20),ph,s(8),‘rgba(0,0,0,0.45)’);
strokeRR(s(10),y,W-s(20),ph,s(8),‘rgba(212,160,23,0.2)’);

// Emoji (large, faded bg)
cx.font=`${s(52)}px serif`; cx.textAlign=‘center’;
cx.globalAlpha=0.10+Math.abs(Math.sin(t*1.1))*0.05;
cx.fillText(sc.emj, s(52), y+ph/2+s(18));
cx.globalAlpha=1;
cx.globalAlpha=0.75;
cx.fillText(sc.emj, s(50), y+ph/2+s(14));
cx.globalAlpha=1;

// Story lines
const sf2=`${s(10.5)}px monospace`;
sc.lines.forEach((ln,i)=>{
tf(ln, s(88), y+s(14)+i*s(15.5), sf2, CREAM, ‘left’, W-s(100));
});

// Wall sign
glow(GREEN,4);
tf(sc.sign, W/2, y+ph-s(8),
`italic ${s(8.5)}px monospace`, ‘rgba(57,255,20,0.5)’, ‘center’, W-s(24));
ng();

y += ph+s(8);

// Choice buttons (2x2 grid)
const cbw=(W-s(32))/2, cbh=s(80), cgap=s(8);
sc.choices.forEach((ch,i)=>{
const col=i%2, row=Math.floor(i/2);
const bx=s(10)+col*(cbw+cgap);
const by2=y+row*(cbh+cgap);

```
fillRR(bx,by2,cbw,cbh,s(7),'rgba(12,6,2,0.92)');

// Risk left strip
cx.globalAlpha=0.8;
cx.fillStyle=RISK_C[ch.risk];
rr(bx,by2,s(5),cbh,s(7)); cx.fill();
cx.globalAlpha=1;

strokeRR(bx,by2,cbw,cbh,s(7),'rgba(212,160,23,0.22)');

// Number
tf(String(i+1), bx+s(14), by2+s(22),
   `${s(16)}px Bebas,Impact,sans-serif`, GOLD, 'left');

// Choice text wrapped
const ctf=`${s(9.5)}px monospace`;
const ctlines = wrapText(ch.t, cbw-s(24), ctf).slice(0,3);
ctlines.forEach((cl,li)=>tf(cl, bx+s(12), by2+s(34)+li*s(13), ctf, CREAM, 'left'));

// Risk pill
const pf=`${s(8.5)}px Bebas,Impact,sans-serif`;
fillRR(bx+s(8),by2+cbh-s(18),cbw-s(16),s(13),s(3),RISK_C[ch.risk]+'22');
tf(RISK_L[ch.risk], bx+cbw/2, by2+cbh-s(9), pf, RISK_C[ch.risk], 'center');

reg('ch'+i,bx,by2,cbw,cbh,()=>doChoice(i));

});
}

// ── FEEDBACK ────────────────────────────────────────────────────
function drawFeedback(t) {
drawGame(t);
cx.fillStyle=‘rgba(0,0,0,0.75)’;
cx.fillRect(0,0,W,H);
BTNS=[];

const fd=G.fb;
const pw=W-s(56), ph=s(200), px=s(28), py=H/2-ph/2;

fillRR(px,py,pw,ph,s(14),DARK);
strokeRR(px,py,pw,ph,s(14),GOLD,1.5);

cx.font=`${s(42)}px serif`; cx.textAlign=‘center’;
cx.fillText(fd.ic, W/2, py+s(52));

glow(GOLD,12);
tf(fd.hd, W/2, py+s(78), `${s(18)}px Bebas,Impact,sans-serif`, GOLD, ‘center’);
ng();

const ef=`${s(10)}px monospace`;
const elines=wrapText(fd.he, pw-s(36), ef);
elines.forEach((l,i)=>tf(l, W/2, py+s(96)+i*s(16), ef, CREAM, ‘center’));

// Stat changes
const chg=fd.ch;
const cf2=`${s(9)}px Bebas,Impact,sans-serif`;
let cx3=px+s(16);
if(chg.pts!==0){
tf((chg.pts>0?’+’:’’)+chg.pts+’ PTS’, cx3, py+ph-s(20), cf2, chg.pts>0?GREEN:RED, ‘left’);
cx3+=s(78);
}
if(chg.sus!==0){
tf((chg.sus>0?’+’:’’)+chg.sus+’ SUS’, cx3, py+ph-s(20), cf2, chg.sus>0?RED:GREEN, ‘left’);
cx3+=s(68);
}
if(chg.ht!==0){
tf((chg.ht>0?’+’:’’)+chg.ht+’ HEAT’, cx3, py+ph-s(20), cf2, chg.ht>0?RED:GREEN, ‘left’);
}

// Progress bar (timer)
const prog=G.fbt/2.2;
cx.fillStyle=‘rgba(255,255,255,0.08)’;
cx.fillRect(px+s(10),py+ph-s(7),pw-s(20),s(4));
cx.fillStyle=GOLD;
cx.fillRect(px+s(10),py+ph-s(7),(pw-s(20))*(1-prog),s(4));
}

// ── GAME OVER ────────────────────────────────────────────────────
function drawOver(t) {
BTNS=[];
const ed=G.end;

cx.fillStyle=DARK; cx.fillRect(0,0,W,H);
const g2=cx.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,W*0.7);
g2.addColorStop(0,ed.win?‘rgba(80,50,5,0.5)’:‘rgba(80,8,8,0.5)’);
g2.addColorStop(1,‘rgba(0,0,0,0)’);
cx.fillStyle=g2; cx.fillRect(0,0,W,H);

if(Math.random()>0.7) spawnPts(Math.random()*W, H+10, ed.win?GOLD:RED, 2);

const ctr=W/2;
let y=H*0.08;

cx.font=`${s(60)}px serif`; cx.textAlign=‘center’;
cx.fillText(ed.ic, ctr, y+s(60));
y+=s(76);

glow(ed.win?GOLD:RED,18);
tf(ed.ti, ctr, y, `${s(30)}px Bebas,Impact,sans-serif`, ed.win?GOLD:RED, ‘center’, W-s(24));
ng();
y+=s(40);

tf(’FINAL CAFÉ SCORE: ’+G.score, ctr, y,
`${s(14)}px Bebas,Impact,sans-serif`, GOLD, ‘center’);
y+=s(22);

if(ed.gr){
tf(ed.gr, ctr, y, `${s(11)}px Bebas,Impact,sans-serif`, STEAM, ‘center’);
y+=s(22);
}

cx.strokeStyle=‘rgba(212,160,23,0.3)’; cx.lineWidth=1;
cx.beginPath(); cx.moveTo(s(36),y); cx.lineTo(W-s(36),y); cx.stroke();
y+=s(16);

const etf2=`${s(11)}px monospace`;
const etls=wrapText(ed.tx, W-s(52), etf2);
etls.forEach((l,i)=>tf(l, ctr, y+i*s(18), etf2, CREAM, ‘center’));
y+=etls.length*s(18)+s(22);

const rbw=W-s(56), rbh=s(54), rbx=s(28), rby=Math.min(y,H-s(110));
const p2=0.82+Math.sin(t*2.5)*0.18;
cx.globalAlpha=p2;
fillRR(rbx,rby,rbw,rbh,s(10),RED);
cx.globalAlpha=1;
tf(‘ORDER AGAIN ↺’, rbx+rbw/2, rby+rbh/2+s(8),
`bold ${s(15)}px Bebas,Impact,sans-serif`, CREAM, ‘center’);
reg(‘restart’,rbx,rby,rbw,rbh,()=>{
G={…G, screen:‘intro’, si:0, score:0, sus:0, heat:0, fb:null, fbt:0, end:null, pts:[]};
});
}

// ── Game Logic ────────────────────────────────────────────────────
function doChoice(i) {
if(G.screen!==‘game’) return;
const ch = SCENES[G.si].choices[i];
G.score = Math.max(0, G.score+ch.pts);
G.sus   = Math.max(0, Math.min(100, G.sus+ch.sus));
G.heat  = Math.max(0, Math.min(100, G.heat+ch.ht));
spawnPts(W/2, H*0.6, RISK_C[ch.risk], 14);
G.fb = { ic:ch.ic, hd:ch.hd, he:ch.he, ch:{pts:ch.pts,sus:ch.sus,ht:ch.ht} };
G.fbt=0;
G.screen=‘fb’;
}

function checkEnd() {
if(G.sus>=100){
G.end={ic:‘📞’,ti:‘LAISHA MADE A CALL’,win:false,
tx:‘Someone arrived in a black Suburban in 8 minutes. No explanation. You left your horchata unfinished. Best horchata of your life.’};
G.screen=‘over’; return;
}
if(G.heat>=100){
G.end={ic:‘🚔’,ti:‘DEA WANTS A WORD’,win:false,
tx:‘New Balance 990s outside your apartment. “Just questions.” It is never just questions. The torta de mole haunts your dreams.’};
G.screen=‘over’; return;
}
if(G.si>=SCENES.length){
const gr=G.score>=160?‘LEGENDARY CUSTOMER’:G.score>=120?‘SOLID REGULAR’:G.score>=80?‘PASSABLE HUMAN’:‘SUSPICIOUS INDIVIDUAL’;
G.end={ic:‘☕’,ti:‘EL RINCÓN TE DA LAS GRACIAS’,win:true,gr,
tx:G.score>=130
?‘You navigated the most complicated Tuesday of your life with grace. The horchata latte was a 10/10. Laisha runs a good shop. You are choosing to believe that.’
:‘You made some choices today. Some were coffee choices. Some were others. The horchata was objectively excellent and nothing changes that.’};
G.screen=‘over’; return;
}
}

// ── Main Loop ──────────────────────────────────────────────────────
function loop(ts) {
const dt = Math.min((ts-G.lt)/1000, 0.05);
G.lt=ts; G.t+=dt;

if(G.screen===‘fb’){
G.fbt+=dt;
if(G.fbt>=2.2){
G.si++;
G.screen=‘game’;
checkEnd();
}
}

tickPts(dt);

cx.fillStyle=’#000’; cx.fillRect(0,0,W,H);

if(G.screen===‘intro’) drawIntro(G.t);
else if(G.screen===‘game’) drawGame(G.t);
else if(G.screen===‘fb’)   drawFeedback(G.t);
else if(G.screen===‘over’) drawOver(G.t);

drawPts();
drawGrain();

requestAnimationFrame(loop);
}

G.lt = performance.now();
requestAnimationFrame(loop);
</script>
