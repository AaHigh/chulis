<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LA CHULIS</title>
<style>
*{margin:0;padding:0}
html,body{background:#111;width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0}
canvas{position:fixed;top:0;left:0;touch-action:none}
#log{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(0,0,0,0.85);color:#0f0;font:bold 16px monospace;padding:12px;white-space:pre-wrap;pointer-events:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="log">LOADING...</div>
<script>
var L=document.getElementById('log');
var lines=[];
function log(s){lines.push(s);if(lines.length>20)lines.shift();L.textContent=lines.join('\n');}

log(‘1. script started’);

try{
var cv=document.getElementById(‘cv’);
log(’2. canvas: ’+(cv?‘found’:‘MISSING’));

var SW=document.documentElement.clientWidth||window.innerWidth||390;
var SH=document.documentElement.clientHeight||window.innerHeight||844;
cv.width=SW; cv.height=SH;
cv.style.width=SW+‘px’; cv.style.height=SH+‘px’;
log(’3. size: ’+SW+‘x’+SH);

var ctx=cv.getContext(‘2d’);
log(’4. ctx: ’+(ctx?‘OK’:‘NULL’));

ctx.fillStyle=’#1a0800’;
ctx.fillRect(0,0,SW,SH);
log(‘5. fillRect OK’);

ctx.fillStyle=’#d4a017’;
ctx.font=‘bold 48px Impact,sans-serif’;
ctx.textAlign=‘center’;
ctx.textBaseline=‘middle’;
ctx.fillText(‘EL RINCON’,SW/2,SH*0.4);
ctx.fillText(‘LA CHULIS’,SW/2,SH*0.5);
log(‘6. text drawn OK’);

var frame=0;
function loop(ts){
requestAnimationFrame(loop);
frame++;
if(frame===60){
log(‘7. 60 frames OK - rAF working’);
// Draw pulsing border to confirm animation
ctx.strokeStyle=‘rgba(212,160,23,’+(0.5+0.5*Math.sin(ts/300))+’)’;
ctx.lineWidth=4;
ctx.strokeRect(10,10,SW-20,SH-20);
}
if(frame===120) log(‘8. 120 frames - FULLY WORKING’);
}
requestAnimationFrame(loop);
log(‘rAF: scheduled’);

} catch(e) {
log(’ERROR: ’+e.message);
log(e.stack||‘no stack’);
}

window.onerror=function(msg,src,line){log(‘JSERR L’+line+’: ’+msg);return false;};
</script>

</body>
</html>
