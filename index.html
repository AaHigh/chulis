function resize() {
DPR = Math.min(window.devicePixelRatio || 1, 3);
W = window.innerWidth;
H = window.innerHeight;
// Set backing store size
cv.width  = Math.round(W * DPR);
cv.height = Math.round(H * DPR);
// CSS size always fills viewport
cv.style.width  = W + ‘px’;
cv.style.height = H + ‘px’;
// Scale factor: design base 390×844 (iPhone 14)
SC = Math.min(W / 390, H / 844);
}

// ── Button registry ──────────────────────────────────────
let BTNS = [];
function reg(id, x, y, w, h, fn) {
BTNS.push({ id, x, y, w, h, fn });
}

// ── Input ────────────────────────────────────────────────
cv.addEventListener(‘pointerdown’, function(e) {
e.preventDefault();
const r = cv.getBoundingClientRect();
const px = (e.clientX - r.left);
const py = (e.clientY - r.top);
for (const b of BTNS) {
if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
b.fn();
return;
}
}
}, { passive: false });

// Also handle touch for older iOS
cv.addEventListener(‘touchstart’, function(e) {
e.preventDefault();
const r = cv.getBoundingClientRect();
const t0 = e.changedTouches[0];
const px = t0.clientX - r.left;
const py = t0.clientY - r.top;
for (const b of BTNS) {
if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
b.fn();
return;
}
}
}, { passive: false });

// ── Particles ────────────────────────────────────────────
function spawnPts(x, y, col, n) {
n = n || 10;
for (let i = 0; i < n; i++) {
G.pts.push({
x: x, y: y,
vx: (Math.random() - 0.5) * 5,
vy: -Math.random() * 6 - 1,
life: 1.0,
col: col,
r: Math.random() * 3 + 2
});
}
}
function tickPts(dt) {
const alive = [];
for (const p of G.pts) {
p.x += p.vx * dt * 60;
p.y += p.vy * dt * 60;
p.vy += 0.18 * dt * 60;
p.life -= dt * 1.8;
if (p.life > 0) alive.push(p);
}
G.pts = alive;
}
function drawPts() {
for (const p of G.pts) {
cx.globalAlpha = p.life;
cx.fillStyle = p.col;
cx.beginPath();
cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
cx.fill();
}
cx.globalAlpha = 1;
}

// ── Draw helpers ─────────────────────────────────────────
function rr(x, y, w, h, r) {
cx.beginPath();
cx.moveTo(x + r, y);
cx.arcTo(x+w, y,   x+w, y+h, r);
cx.arcTo(x+w, y+h, x,   y+h, r);
cx.arcTo(x,   y+h, x,   y,   r);
cx.arcTo(x,   y,   x+w, y,   r);
cx.closePath();
}
function fillRR(x,y,w,h,r,col)     { cx.fillStyle=col; rr(x,y,w,h,r); cx.fill(); }
function strokeRR(x,y,w,h,r,col,lw){ cx.strokeStyle=col; cx.lineWidth=lw||1; rr(x,y,w,h,r); cx.stroke(); }

// Font stack: Bebas Neue if loaded by browser cache, else Impact, else sans-serif
const FONT_TITLE = ‘Impact, Arial Black, sans-serif’;
const FONT_MONO  = ‘Courier New, monospace’;

function tf(str, x, y, sz, col, align, maxW, bold, mono) {
const weight = bold ? ’bold ’ : ‘’;
const face   = mono ? FONT_MONO : FONT_TITLE;
cx.font = weight + s(sz) + ’px ’ + face;
cx.fillStyle = col;
cx.textAlign = align || ‘left’;
if (maxW) cx.fillText(str, x, y, maxW);
else cx.fillText(str, x, y);
}

function glow(col, b) { cx.shadowColor = col; cx.shadowBlur = b; }
function ng()          { cx.shadowBlur = 0; }

function wrapText(str, maxW, sz, mono) {
const face = mono ? FONT_MONO : FONT_TITLE;
cx.font = s(sz) + ‘px ’ + face;
const words = str.split(’ ’);
const lines = [];
let line = ‘’;
for (const w of words) {
const test = line ? line + ’ ’ + w : w;
if (cx.measureText(test).width > maxW && line) {
lines.push(line);
line = w;
} else {
line = test;
}
}
if (line) lines.push(line);
return lines;
}

// ── Grain overlay ────────────────────────────────────────
let grainCache = null, grainFrame = -1;
function drawGrain() {
// Regenerate grain every 3 frames for performance
const frame = Math.floor(G.t * 30);
if (frame !== grainFrame) {
grainFrame = frame;
const gw = 128, gh = 128;
const tmp = document.createElement(‘canvas’);
tmp.width = gw; tmp.height = gh;
const tc = tmp.getContext(‘2d’);
const id = tc.createImageData(gw, gh);
const d = id.data;
for (let i = 0; i < d.length; i += 4) {
const v = Math.random() * 20 | 0;
d[i] = d[i+1] = d[i+2] = v;
d[i+3] = 12;
}
tc.putImageData(id, 0, 0);
grainCache = tmp;
}
if (grainCache) {
cx.globalAlpha = 0.35;
const pat = cx.createPattern(grainCache, ‘repeat’);
cx.fillStyle = pat;
cx.fillRect(0, 0, W, H);
cx.globalAlpha = 1;
}
}

function drawIntro(t) {
BTNS = [];

// Background
cx.fillStyle = ‘#0a0300’;
cx.fillRect(0, 0, W, H);
const g1 = cx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.8);
g1.addColorStop(0, ‘rgba(70,25,5,0.5)’);
g1.addColorStop(1, ‘rgba(0,0,0,0)’);
cx.fillStyle = g1;
cx.fillRect(0, 0, W, H);

// Steam wisps
for (let i = 0; i < 3; i++) {
const sx = W * (0.28 + i * 0.22);
const phase = ((t * 0.5 + i * 1.7) % 1) * H * 0.55;
cx.strokeStyle = ‘rgba(255,200,100,0.04)’;
cx.lineWidth = s(2);
cx.beginPath();
cx.moveTo(sx + Math.sin(t * 0.8 + i) * s(12), H - phase);
cx.quadraticCurveTo(
sx + Math.cos(t + i) * s(18), H - phase - s(60),
sx + Math.sin(t + i + 1) * s(10), H - phase - s(110)
);
cx.stroke();
}

const ctr = W / 2;
let y = H * 0.05;

// Title block
const tsz = 52;
glow(GOLD, 18);
tf(‘EL RINCON’, ctr, y + s(tsz), tsz, GOLD, ‘center’);
tf(‘LA CHULIS’, ctr, y + s(tsz) * 2 + s(4), tsz, GOLD, ‘center’);
ng();
cx.globalAlpha = 0.3;
tf(‘LA CHULIS’, ctr + s(3), y + s(tsz) * 2 + s(8), tsz, RED, ‘center’);
cx.globalAlpha = 1;

y += s(tsz) * 2.3 + s(10);

tf(‘A GAME OF COFFEE, CARTEL LEGACY & QUESTIONABLE CHOICES’,
ctr, y, 9, STEAM, ‘center’, W - s(28));
y += s(16);

// Divider
cx.strokeStyle = GOLDD; cx.lineWidth = 1;
cx.beginPath(); cx.moveTo(s(28), y); cx.lineTo(W - s(28), y); cx.stroke();
y += s(14);

// Lore lines
const lh = s(15.5);
const lore = [
[‘PERRIS, CA.  802 Navajo Rd.  A strip mall.’, true],
[’’, false],
[‘LAISHA OSEGUERA GONZALEZ, 24,’, true],
[‘business student. Daughter of El Mencho —’, false],
[‘CJNG boss, killed Feb 22 in mil. operation.’, false],
[‘Husband El Gaucho: 11 yrs federal.’, false],
[‘Sister La Negra: 25 months money laundering.’, false],
[‘Brother: life sentence.’, false],
[’’, false],
[‘You are a customer.  A suspicious one.’, false],
];
for (const [line, bold] of lore) {
if (line) tf(line, s(22), y, 11, bold ? GOLD : CREAM, ‘left’, W - s(28), bold, true);
y += lh;
}
y += s(6);

// Rules box
const rbH = s(100);
fillRR(s(14), y, W - s(28), rbH, s(7), ‘rgba(255,255,255,0.03)’);
strokeRR(s(14), y, W - s(28), rbH, s(7), ‘rgba(212,160,23,0.2)’);
tf(‘HOW TO PLAY’, s(26), y + s(16), 10, GOLD, ‘left’);
const rules = [
‘4 choices each turn — like a spinner.’,
‘Low / Medium / High / Wildcard risk.’,
‘Suspicion 100% — Laisha makes a call.’,
‘Heat 100% — DEA wants a word.’,
‘Goal: max Cafe Score before getting bounced.’,
];
rules.forEach((r, i) => tf(r, s(26), y + s(30) + i * s(14), 10, i === 0 ? CREAM : STEAM, ‘left’, W - s(50), false, true));
y += rbH + s(10);

// START BUTTON
const bw = W - s(52), bh = s(54), bx = s(26), by = Math.min(y, H - s(110));
const pulse = 0.82 + Math.sin(t * 2.8) * 0.18;
cx.globalAlpha = pulse;
fillRR(bx, by, bw, bh, s(10), GOLD);
cx.globalAlpha = 1;
tf(‘ENTER EL RINCON’, bx + bw/2, by + bh/2 + s(8), 17, ‘#140800’, ‘center’, 0, true);
reg(‘start’, bx, by, bw, bh, function() { G.scr = ‘game’; });

const dy = by + bh + s(11);
tf(’[ Hightower live ] — Claude AI / Anthropic — Satire’,
ctr, dy, 8, ‘rgba(255,255,255,0.2)’, ‘center’, W - s(16), false, true);
}

function drawGame(t) {
BTNS = [];
const sc = SCENES[G.si];

cx.fillStyle = BG;
cx.fillRect(0, 0, W, H);

// Header
const hh = s(52);
cx.fillStyle = DARK;
cx.fillRect(0, 0, W, hh + s(12));
cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
cx.beginPath(); cx.moveTo(0, hh); cx.lineTo(W, hh); cx.stroke();

tf(‘EL RINCON LA CHULIS’, W/2, s(20), 14, GOLD, ‘center’);
tf(‘802 Navajo Rd · Perris, CA’, W/2, s(36), 9, STEAM, ‘center’, 0, false, true);

// Neon flicker sign
const flk = Math.random() > 0.015 ? 1 : 0.25;
cx.globalAlpha = flk;
glow(GREEN, 7);
tf(sc.sign, W/2, s(50), 8.5, ‘rgba(57,255,20,0.6)’, ‘center’, W - s(18), false, true);
ng(); cx.globalAlpha = 1;

// Status row
const sy = hh + s(5);
const sw = W / 4;
const stats = [
{ l:‘TURN’,     v: (G.si+1)+’/8’ },
{ l:‘SCORE’,    v: G.score },
{ l:‘HEAT’,     v: G.heat },
{ l:‘SUS’,      v: G.sus+’%’ },
];
stats.forEach(function(st, i) {
const x = i * sw;
if (i > 0) {
cx.strokeStyle = ‘rgba(212,160,23,0.12)’; cx.lineWidth = 1;
cx.beginPath(); cx.moveTo(x, sy); cx.lineTo(x, sy + s(32)); cx.stroke();
}
tf(st.l, x + sw/2, sy + s(12), 8, STEAM, ‘center’);
const vc = ((st.l===‘SUS’ && G.sus>65)||(st.l===‘HEAT’ && G.heat>65)) ? RED : GOLD;
tf(String(st.v), x + sw/2, sy + s(26), 14, vc, ‘center’, 0, true);
});

// Sus bar
const sby = sy + s(33);
cx.fillStyle = ‘rgba(255,255,255,0.07)’;
cx.fillRect(0, sby, W, s(3));
const sg = cx.createLinearGradient(0, 0, W, 0);
sg.addColorStop(0, ‘#1a7a06’);
sg.addColorStop(0.55, GOLD);
sg.addColorStop(1, RED);
cx.fillStyle = sg;
cx.fillRect(0, sby, (G.sus / 100) * W, s(3));

let y = sby + s(9);

// Location badge
cx.strokeStyle = ‘rgba(192,57,43,0.4)’; cx.lineWidth = 1;
cx.beginPath(); cx.moveTo(s(12), y + s(6)); cx.lineTo(s(44), y + s(6)); cx.stroke();
tf(sc.loc, s(50), y + s(9), 10, RED, ‘left’);
cx.font = s(10) + ’px ’ + FONT_TITLE;
const locW = cx.measureText(sc.loc).width;
cx.beginPath();
cx.moveTo(s(50) + locW + s(6), y + s(6));
cx.lineTo(W - s(12), y + s(6));
cx.stroke();
y += s(18);

// Scene panel
const ph = s(108);
fillRR(s(9), y, W - s(18), ph, s(8), ‘rgba(0,0,0,0.45)’);
strokeRR(s(9), y, W - s(18), ph, s(8), ‘rgba(212,160,23,0.18)’);

// Big emoji (faded)
cx.font = s(50) + ‘px serif’;
cx.textAlign = ‘center’;
cx.globalAlpha = 0.10 + Math.abs(Math.sin(t * 1.1)) * 0.05;
cx.fillText(sc.emj, s(48), y + ph/2 + s(16));
cx.globalAlpha = 0.75;
cx.fillText(sc.emj, s(46), y + ph/2 + s(14));
cx.globalAlpha = 1;

// Story lines
sc.lines.forEach(function(ln, i) {
tf(ln, s(84), y + s(12) + i * s(15), 10.5, CREAM, ‘left’, W - s(96), false, true);
});

// Wall sign at bottom of panel
glow(GREEN, 4);
tf(sc.sign, W/2, y + ph - s(7), 8.5, ‘rgba(57,255,20,0.45)’, ‘center’, W - s(22), false, true);
ng();

y += ph + s(7);

// Choice buttons 2×2
const cbw = (W - s(28)) / 2;
const cbh = s(82);
const cgap = s(8);

sc.ch.forEach(function(ch, i) {
const col = i % 2;
const row = Math.floor(i / 2);
const bx = s(8) + col * (cbw + cgap);
const by = y + row * (cbh + cgap);

```
// Base
fillRR(bx, by, cbw, cbh, s(7), 'rgba(10,5,2,0.95)');

// Risk strip (left edge)
cx.save();
cx.fillStyle = RISK_C[ch.risk];
cx.globalAlpha = 0.75;
rr(bx, by, s(5), cbh, s(7));
cx.fill();
cx.restore();

// Border
strokeRR(bx, by, cbw, cbh, s(7), 'rgba(212,160,23,0.20)');

// Number
tf(String(i+1), bx + s(13), by + s(22), 18, GOLD, 'left', 0, true);

// Choice text wrapped
const ctlines = wrapText(ch.t, cbw - s(22), 10, true).slice(0, 3);
ctlines.forEach(function(cl, li) {
  tf(cl, bx + s(11), by + s(35) + li * s(13), 10, CREAM, 'left', 0, false, true);
});

// Risk label pill
fillRR(bx + s(8), by + cbh - s(17), cbw - s(16), s(13), s(3), RISK_C[ch.risk] + '28');
tf(RISK_E[ch.risk] + ' ' + RISK_L[ch.risk], bx + cbw/2, by + cbh - s(9), 9, RISK_C[ch.risk], 'center');

reg('ch'+i, bx, by, cbw, cbh, (function(idx){ return function(){ doChoice(idx); }; })(i));

});
}

// ── FEEDBACK overlay ────────────────────────────────────
function drawFeedback(t) {
drawGame(t);
cx.fillStyle = ‘rgba(0,0,0,0.78)’;
cx.fillRect(0, 0, W, H);
BTNS = [];

const fd = G.fb;
const pw = W - s(52);
const ph = s(195);
const px = s(26);
const py = H/2 - ph/2;

fillRR(px, py, pw, ph, s(12), DARK);
strokeRR(px, py, pw, ph, s(12), GOLD, 1.5);

// Icon
cx.font = s(40) + ‘px serif’;
cx.textAlign = ‘center’;
cx.fillText(fd.ic, W/2, py + s(50));

// Title
glow(GOLD, 10);
tf(fd.hd, W/2, py + s(76), 18, GOLD, ‘center’, 0, true);
ng();

// Text
const etls = wrapText(fd.he, pw - s(32), 10.5, true);
etls.forEach(function(l, i) {
tf(l, W/2, py + s(93) + i * s(16), 10.5, CREAM, ‘center’, 0, false, true);
});

// Stat delta readout
const chg = fd.ch;
let cx3 = px + s(14);
const df = 9;
if (chg.pts !== 0) {
tf((chg.pts>0?’+’:’’)+chg.pts+’ PTS’, cx3, py+ph-s(19), df, chg.pts>0?GREEN:RED, ‘left’);
cx3 += s(76);
}
if (chg.sus !== 0) {
tf((chg.sus>0?’+’:’’)+chg.sus+’ SUS’, cx3, py+ph-s(19), df, chg.sus>0?RED:GREEN, ‘left’);
cx3 += s(66);
}
if (chg.ht !== 0) {
tf((chg.ht>0?’+’:’’)+chg.ht+’ HEAT’, cx3, py+ph-s(19), df, chg.ht>0?RED:GREEN, ‘left’);
}

// Timer drain bar
const prog = G.fbt / 2.2;
cx.fillStyle = ‘rgba(255,255,255,0.07)’;
cx.fillRect(px + s(8), py + ph - s(7), pw - s(16), s(4));
cx.fillStyle = GOLD;
cx.fillRect(px + s(8), py + ph - s(7), (pw - s(16)) * (1 - prog), s(4));
}

// ── GAME OVER screen ─────────────────────────────────────
function drawOver(t) {
BTNS = [];
const ed = G.end;

cx.fillStyle = DARK;
cx.fillRect(0, 0, W, H);
const g2 = cx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.7);
g2.addColorStop(0, ed.win ? ‘rgba(80,50,5,0.55)’ : ‘rgba(80,8,8,0.55)’);
g2.addColorStop(1, ‘rgba(0,0,0,0)’);
cx.fillStyle = g2;
cx.fillRect(0, 0, W, H);

// Particle rain
if (Math.random() > 0.7) spawnPts(Math.random() * W, H + 10, ed.win ? GOLD : RED, 2);

const ctr = W / 2;
let y = H * 0.08;

cx.font = s(56) + ‘px serif’;
cx.textAlign = ‘center’;
cx.fillText(ed.ic, ctr, y + s(56));
y += s(72);

glow(ed.win ? GOLD : RED, 16);
tf(ed.ti, ctr, y, 28, ed.win ? GOLD : RED, ‘center’, W - s(20), true);
ng();
y += s(40);

tf(’FINAL CAFE SCORE: ’ + G.score, ctr, y, 14, GOLD, ‘center’, 0, true);
y += s(22);

if (ed.gr) {
tf(ed.gr, ctr, y, 11, STEAM, ‘center’);
y += s(22);
}

cx.strokeStyle = ‘rgba(212,160,23,0.28)’; cx.lineWidth = 1;
cx.beginPath(); cx.moveTo(s(32), y); cx.lineTo(W - s(32), y); cx.stroke();
y += s(16);

const etls = wrapText(ed.tx, W - s(48), 11, true);
etls.forEach(function(l, i) {
tf(l, ctr, y + i * s(18), 11, CREAM, ‘center’, 0, false, true);
});
y += etls.length * s(18) + s(20);

// Restart button
const rbw = W - s(52), rbh = s(54), rbx = s(26);
const rby = Math.min(y, H - s(108));
const pulse = 0.82 + Math.sin(t * 2.5) * 0.18;
cx.globalAlpha = pulse;
fillRR(rbx, rby, rbw, rbh, s(10), RED);
cx.globalAlpha = 1;
tf(‘ORDER AGAIN’, rbx + rbw/2, rby + rbh/2 + s(8), 17, CREAM, ‘center’, 0, true);
reg(‘restart’, rbx, rby, rbw, rbh, function() {
G = { scr:‘intro’, si:0, score:0, sus:0, heat:0, fb:null, fbt:0, end:null, t:0, lt:performance.now(), pts:[] };
});
}

// ── Game logic ────────────────────────────────────────────
function doChoice(i) {
if (G.scr !== ‘game’) return;
const ch = SCENES[G.si].ch[i];
G.score = Math.max(0, G.score + ch.pts);
G.sus   = Math.max(0, Math.min(100, G.sus + ch.sus));
G.heat  = Math.max(0, Math.min(100, G.heat + ch.ht));
spawnPts(W/2, H * 0.6, RISK_C[ch.risk], 14);
G.fb  = { ic:ch.ic, hd:ch.hd, he:ch.he, ch:{ pts:ch.pts, sus:ch.sus, ht:ch.ht } };
G.fbt = 0;
G.scr = ‘fb’;
}

function checkEnd() {
if (G.sus >= 100) {
G.end = { ic:‘📞’, ti:‘LAISHA MADE A CALL’, win:false,
tx:‘Someone arrived in a black Suburban in 8 minutes. No explanation. You left your horchata unfinished. Best horchata of your life.’ };
G.scr = ‘over’; return;
}
if (G.heat >= 100) {
G.end = { ic:‘🚔’, ti:‘DEA WANTS A WORD’, win:false,
tx:‘New Balance 990s outside your apartment. “Just questions.” Never just questions. The torta de mole haunts your dreams.’ };
G.scr = ‘over’; return;
}
if (G.si >= SCENES.length) {
const gr = G.score>=160?‘LEGENDARY CUSTOMER’:G.score>=120?‘SOLID REGULAR’:G.score>=80?‘PASSABLE HUMAN’:‘SUSPICIOUS INDIVIDUAL’;
G.end = { ic:‘☕’, ti:‘EL RINCON TE DA LAS GRACIAS’, win:true, gr:gr,
tx: G.score >= 130
? ‘You navigated the most complicated Tuesday of your life with grace. The horchata was a 10/10. Laisha runs a good shop. You are choosing to believe that.’
: ‘You made some choices today. Some were coffee choices. Some were others. The horchata was excellent and nothing changes that.’ };
G.scr = ‘over’;
}
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(ts) {
const dt = Math.min((ts - G.lt) / 1000, 0.05);
G.lt = ts;
G.t += dt;

// Feedback auto-advance
if (G.scr === ‘fb’) {
G.fbt += dt;
if (G.fbt >= 2.2) {
G.si++;
G.scr = ‘game’;
checkEnd();
}
}

tickPts(dt);

// *** DPR scaling applied fresh each frame ***
// This is the Safari-safe approach: save/scale/draw/restore
cx.save();
cx.scale(DPR, DPR);

// Clear
cx.fillStyle = ‘#000’;
cx.fillRect(0, 0, W, H);

if      (G.scr === ‘intro’) drawIntro(G.t);
else if (G.scr === ‘game’)  drawGame(G.t);
else if (G.scr === ‘fb’)    drawFeedback(G.t);
else if (G.scr === ‘over’)  drawOver(G.t);

drawPts();
drawGrain();

cx.restore();

requestAnimationFrame(loop);
}

// ── BOOT — wait for DOM ready, then resize, then start loop
window.addEventListener(‘load’, function() {
resize();
window.addEventListener(‘resize’, resize);
G.lt = performance.now();
requestAnimationFrame(loop);
});
</script>
